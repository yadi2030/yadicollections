<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YADI · In order, a pulse of freedom</title>
<style>
  :root{
    --slate:#2F3B48; --soft:#7C8794; --red:#D32B2B;
    --sky:#7FB8D9; --sky-deep:#3A80C4; --blue:#2D76D6;
    --line:#7FB8D9; --bg:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,"Helvetica Neue","Apple SD Gothic Neo","Pretendard",sans-serif;
    color:var(--slate); background:var(--bg); min-height:100vh;
    padding:56px 22px 44px; display:flex; flex-direction:column; align-items:center;
  }
  .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center}
  .logo img.full{width:300px;max-width:78%;display:block;margin:0 auto}
  .logo img.word{width:176px;display:block;margin:0 auto}
  .divider{display:flex;align-items:center;justify-content:center;margin:22px 0 10px}
  .divider .l{height:2px;width:66px}
  .divider .b{background:var(--blue)} .divider .r{background:var(--red)}
  .divider .dot{width:7px;height:7px;border-radius:50%;margin:0 -3px;z-index:2;
    background:linear-gradient(90deg,var(--blue) 50%,var(--red) 50%)}
  .slogan{font-style:italic;font-family:"Playfair Display",Georgia,serif;
    font-size:15px;color:var(--soft);margin-bottom:5px}
  .ko{font-size:12.5px;letter-spacing:3px;color:var(--soft);margin-bottom:18px}
  .welcome{text-align:center;font-size:14px;line-height:1.7;color:var(--slate);margin:22px 0 34px}
  .welcome span{display:block;font-family:"Playfair Display",Georgia,serif;font-style:italic;
    font-size:12.5px;color:var(--soft);margin-top:3px}
  a.btn{
    width:100%;display:flex;align-items:center;gap:15px;
    background:#fff;border:1.6px solid var(--sky);border-radius:18px;
    padding:13px 16px;margin-bottom:16px;text-decoration:none;color:var(--slate);
    box-shadow:0 4px 14px rgba(127,184,217,.18);
    transition:transform .18s, box-shadow .18s, border-color .18s, background .18s;
  }
  a.btn:hover{transform:translateY(-2px);border-color:var(--sky-deep);
    background:#F7FBFE;box-shadow:0 12px 24px rgba(127,184,217,.30)}
  a.btn:active{transform:translateY(0)}
  .thumb{width:60px;height:60px;border-radius:13px;object-fit:cover;flex:0 0 60px;
    border:1.5px solid var(--sky)}
  .txt{flex:1;min-width:0;display:flex;align-items:center}
  .txt .t{font-size:16px;font-weight:600}
  .txt .s{font-size:12px;color:var(--soft);margin-top:2px}
  .arrow{font-size:18px;color:var(--sky-deep);flex:0 0 auto}
  .badge{font-size:10px;font-weight:700;color:#fff;background:var(--red);
    border-radius:6px;padding:2px 7px;letter-spacing:.5px;margin-left:6px;vertical-align:middle}
  .foot{margin-top:20px;font-size:11px;letter-spacing:1px;color:#A9B2BB;text-align:center;line-height:1.8}
  .foot a{color:#A9B2BB;text-decoration:none}
</style>
</head>
